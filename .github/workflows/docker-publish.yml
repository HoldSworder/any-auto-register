name: Build, Push & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            constq/any-auto-register:latest
            constq/any-auto-register:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to remote server
        uses: appleboy/ssh-action@v1
        env:
          IMAGE_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: IMAGE_TAG
          script: |
            DOCKER=/usr/local/bin/docker
            IMAGE=constq/any-auto-register:${IMAGE_TAG}
            CONTAINER=any-auto-register
            DATA_DIR=/volume1/docker/any-auto-register/data
            EXT_DIR=/volume1/docker/any-auto-register/_ext_targets

            echo "📦 部署镜像: $IMAGE"

            mkdir -p $DATA_DIR $EXT_DIR

            $DOCKER pull $IMAGE

            $DOCKER stop $CONTAINER || true
            $DOCKER rm $CONTAINER || true

            $DOCKER run -d \
              --name $CONTAINER \
              --init \
              --restart unless-stopped \
              --shm-size=1g \
              -p 9105:8000 \
              -p 9106:8889 \
              -e HOST=0.0.0.0 \
              -e PORT=8000 \
              -e APP_RELOAD=0 \
              -e APP_CONDA_ENV=docker \
              -e APP_RUNTIME_DIR=/runtime \
              -e APP_ENABLE_SOLVER=1 \
              -e SOLVER_PORT=8889 \
              -e SOLVER_BIND_HOST=0.0.0.0 \
              -e LOCAL_SOLVER_URL=http://127.0.0.1:8889 \
              -e SOLVER_BROWSER_TYPE=camoufox \
              -v $DATA_DIR:/runtime \
              -v $EXT_DIR:/app/_ext_targets \
              $IMAGE

            echo "⏳ 等待容器启动..."
            sleep 8

            if ! $DOCKER ps --filter name=$CONTAINER --filter status=running -q | grep -q .; then
              echo "❌ 容器启动失败"
              $DOCKER logs $CONTAINER --tail 30
              exit 1
            fi

            for i in $(seq 1 6); do
              HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:9105/ 2>/dev/null || echo "000")
              if [ "$HTTP_CODE" = "200" ]; then
                echo "✅ 部署成功"
                break
              fi
              if [ "$i" = "6" ]; then
                echo "⚠️ 健康检查未通过（HTTP $HTTP_CODE），但容器仍在运行"
              fi
              sleep 5
            done

            $DOCKER ps --filter name=$CONTAINER --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
            $DOCKER image prune -f
